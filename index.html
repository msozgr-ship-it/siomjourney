<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SiomJourney | Spatial Stage</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-spatial" id="dynamic-bg"></div>

<header class="top-nav">
  <div class="nav-left">
    <div class="logo-s-small">S</div>
    <nav class="nav-links">
      <a href="#" class="active">Browse</a>
      <a href="#">My List</a>
      <a href="#">Settings</a>
    </nav>
  </div>
  <div class="nav-right">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="main-search" placeholder="Search" onfocus="openSearch()">
    </div>
    <div class="user-profile">
      <img src="https://i.pravatar.cc/150?u=siom" alt="User">
      <span>A. Chen</span>
    </div>
  </div>
</header>

<div class="main-container">
  <!-- HERO SECTION (OVAL ORBITAL) -->
  <section class="hero-spatial">
    <div class="hero-bg-text">SPATIAL CINEMA</div>
    <div class="hero-subtitle">EXPLORE NEW FRONTIERS</div>
    
    <div class="orbital-wrapper">
      <div class="giant-s-neon">S</div>
      <div class="orbital-belt" id="coverflow-container">
        <!-- JS ile dolacak -->
      </div>
      <!-- Görseldeki o enerji çizgileri efekti için -->
      <div class="energy-lines"></div>
    </div>

    <div class="orbital-controls">
      <button class="ctrl-btn" onclick="prevOrbital()">❮</button>
      <div class="ctrl-indicator"></div>
      <button class="ctrl-btn" onclick="nextOrbital()">❯</button>
    </div>
  </section>

  <!-- DYNAMIC STAGE AREA (NEW BOTTOM PART) -->
  <section class="hero-stage" id="movie-stage">
    <div class="stage-content">
      <div class="stage-info">
        <div class="stage-badge" id="st-badge">FEATURED</div>
        <h1 id="st-title">Seçili Film</h1>
        <div class="st-meta">
          <span id="st-year">2026</span> • 
          <span id="st-rating">★ 8.9</span> • 
          <span id="st-match">98% Match</span>
        </div>
        <p id="st-desc">Orbital'den bir film seçin.</p>
        
        <div class="stage-actions">
          <button class="play-btn-giant" id="st-play-btn" onclick="playCurrent()">
            <span class="play-icon">▶</span> PLAY NOW
          </button>
          <button class="list-btn">＋ MY LIST</button>
        </div>
      </div>

      <div class="stage-details" id="st-details-panel">
        <!-- Diziler için bölüm listesi buraya gelecek -->
        <div class="episodes-belt" id="st-episodes"></div>
      </div>
    </div>
  </section>
</div>

<!-- MODALS -->
<div id="player-modal">
  <div class="close-btn" onclick="closePlayer()">✕</div>
  <div class="player-container" id="player-container">
    <video id="video-player" playsinline webkit-playsinline preload="none"></video>
    <iframe id="yt-player" allow="autoplay; fullscreen" allowfullscreen="true" style="display:none;"></iframe>
  </div>
</div>

<div id="search-modal">
  <div class="close-btn" onclick="closeSearch()">✕</div>
  <div class="search-container">
    <input type="text" id="search-input" placeholder="SiomJourney'de ara..." autocomplete="off">
    <div class="search-results cards-row" id="search-results"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
