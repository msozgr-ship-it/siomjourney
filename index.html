<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SiomJourney | S-Orbital Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="bg-spatial"></div>

<div class="main-wrapper">
  <!-- S-MATRIX SIDEBAR -->
  <aside class="s-sidebar">
    <div class="brand-hub">
      <div class="logo-s-giant">S</div>
      <div class="brand-name">SiomJourney</div>
    </div>
    <nav class="side-nav">
      <a href="#" class="active">Ana Sayfa</a>
      <a href="javascript:void(0)" onclick="openSearch()">Arama</a>
      <a href="#kutuphane">Kütüphane</a>
    </nav>
  </aside>

  <!-- CONTENT HUB -->
  <main class="content-matrix">
    <div class="hero-orbital">
      <div class="orbital-container" id="coverflow-container"></div>
      <div class="cf-title-overlay">
        <h1 id="cf-title">Yükleniyor...</h1>
        <div id="cf-meta">...</div>
      </div>
    </div>

    <div id="kutuphane">
      <!-- Kategoriler JS ile buraya Matrix düzeninde dolacak -->
    </div>
  </main>
</div>

<!-- MODALS -->
<div id="series-modal">
  <div class="close-btn" onclick="closeSeriesModal()">✕</div>
  <div class="series-modal-content">
    <div class="series-header">
      <img id="sm-poster" class="series-poster" src="" alt="Poster">
      <div class="series-info">
        <h2 id="sm-title"></h2>
        <p id="sm-desc"></p>
      </div>
    </div>
    <div class="episodes-list" id="sm-episodes"></div>
  </div>
</div>

<div id="player-modal">
  <div class="close-btn" onclick="closePlayer()">✕</div>
  <div class="player-container" id="player-container">
    <div class="player-loader" id="player-loader"></div>
    <video id="video-player" playsinline webkit-playsinline></video>
    <iframe id="yt-player" allow="autoplay; fullscreen" allowfullscreen="true" style="display:none;"></iframe>
    <div id="coming-soon-overlay" class="coming-soon-overlay" style="display:none;">
      <div class="soon-content">
        <div class="soon-badge">YAKINDA</div>
        <h1>Bu İçerik Hazırlanıyor</h1>
        <p>SiomJourney ekibi bu içeriği hazırlıyor. Lütfen takipte kal!</p>
        <div class="soon-loader"></div>
      </div>
    </div>
  </div>
</div>

<div id="search-modal">
  <div class="close-btn" onclick="closeSearch()">✕</div>
  <div class="search-container">
    <input type="text" id="search-input" placeholder="SiomJourney'de ara..." autocomplete="off">
    <div class="search-results cards-row" id="search-results" style="display:flex; flex-wrap:wrap; gap:15px;"></div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
