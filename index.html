<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | Spatial Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=2.6">
</head>
<body>
    <div class="bg-spatial"></div>

    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-s-small">S</div>
            <nav class="nav-links"><a href="#" onclick="resetFilter()">Anasayfa</a></nav>
        </div>
        <div class="nav-right">
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Arama...">
            </div>
        </div>
    </header>

    <div class="main-container">
        <section class="hero-spatial" id="hero-drag-area">
            <div class="orbital-wrapper">
                <div class="giant-s-neon">S</div>
                <div class="orbital-belt" id="orbital-container"></div>
            </div>
        </section>

        <main class="content-matrix" id="content-matrix"></main>
    </div>

    <!-- SERIES LIST MODAL -->
    <div id="details-modal" class="details-modal">
        <div class="modal-close" onclick="closeDetails()">✕</div>
        <div class="modal-inner">
            <h1 id="details-title"></h1>
            <div class="series-grid" id="details-grid"></div>
        </div>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal">
        <div class="close-btn" onclick="closePlayer()">✕</div>
        <div class="player-container">
            <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
        </div>
    </div>

    <script src="js/data.js?v=2.6"></script>
    <script src="js/app.js?v=2.6"></script>
</body>
</html>
