<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | S-Orbital Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-spatial"></div>

    <div class="main-wrapper">
        <!-- S-MATRIX SIDEBAR -->
        <aside class="s-sidebar">
            <div class="logo-area">
                <div class="logo-s-giant">S</div>
                <div class="brand-name">SiomJourney</div>
            </div>
            
            <nav class="side-nav">
                <a href="#" class="active">ANASAYFA</a>
                <a href="#">FİLMLER</a>
                <a href="#">DİZİLER</a>
                <a href="#">LİSTEM</a>
            </nav>

            <div class="user-area">
                <img src="https://i.pravatar.cc/150?u=siom" alt="User" style="width:55px; height:55px; border-radius:50%; border:2px solid var(--accent); cursor:pointer;">
            </div>
        </aside>

        <!-- CONTENT HUB -->
        <main class="content-matrix">
            
            <!-- S-ORBITAL HERO -->
            <section class="hero-orbital">
                <div class="orbital-container" id="orbital-container">
                    <!-- JS ile dolacak -->
                </div>
                
                <div class="cf-title-overlay">
                    <h1 id="cf-title">Yükleniyor...</h1>
                    <div id="cf-meta">2025 • S-ORBITAL EDITION</div>
                </div>
            </section>

            <!-- CATEGORY MATRIX -->
            <div id="content-matrix">
                <!-- Kategoriler JS ile buraya dolacak -->
            </div>

        </main>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal">
        <div class="close-btn" onclick="closePlayer()">✕</div>
        <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
