<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SiomJourney | Spatial Cinema</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-spatial"></div>

    <!-- TOP NAVIGATION -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-s-small">S</div>
            <nav class="nav-links">
                <a href="#" class="active">Browse</a>
                <a href="#">My List</a>
                <a href="#">Settings</a>
            </nav>
        </div>
        <div class="nav-right">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search">
            </div>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/150?u=siom" alt="User">
                <span>A. Chen</span>
            </div>
        </div>
    </header>

    <div class="main-container">
        <!-- HERO SPATIAL SECTION -->
        <section class="hero-spatial">
            <div class="hero-bg-text">SPATIAL CINEMA</div>
            <div class="hero-subtitle">EXPLORE NEW FRONTIERS</div>
            
            <div class="orbital-wrapper">
                <div class="giant-s-neon">S</div>
                <div class="orbital-belt" id="orbital-container">
                    <!-- JS ile dolacak -->
                </div>
            </div>

            <div class="orbital-controls">
                <button class="ctrl-btn" onclick="prevOrbital()">❮</button>
                <div class="ctrl-indicator" id="orbital-indicator"></div>
                <button class="ctrl-btn" onclick="nextOrbital()">❯</button>
            </div>
        </section>

        <!-- CONTENT MATRIX -->
        <main class="content-matrix" id="content-matrix">
            <!-- Kategoriler JS ile dolacak -->
        </main>
    </div>

    <!-- PLAYER MODAL -->
    <div id="player-modal">
        <div class="close-btn" onclick="closePlayer()">✕</div>
        <div class="player-container">
            <iframe id="player-frame" allow="autoplay; fullscreen" allowfullscreen="true"></iframe>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
