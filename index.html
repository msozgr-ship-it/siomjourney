<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SiomJourney | Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav id="navbar">
  <div class="logo">Siom<span>Journey</span></div>
  <div class="nav-links">
    <a href="#" class="active">Ana Sayfa</a>
    <a href="#diziler">Orijinaller</a>
    <a href="#filmler">Filmler</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-bg-container">
    <video class="hero-media" id="hero-video" autoplay muted loop playsinline></video>
    <iframe class="hero-media" id="hero-yt" style="display:none; pointer-events:none;" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true"></iframe>
    <div class="hero-overlay"></div>
  </div>
  
  <div class="hero-content">
    <div class="hero-badge"><span style="font-family: serif; font-style: italic; font-weight: 900; font-size: 16px; margin-right: 4px; color: var(--accent);">S</span> <span id="hero-type">Orijinal Dizi</span></div>
    <h1 class="hero-title" id="hero-title">Yükleniyor...</h1>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-btns">
      <button class="btn btn-play" id="hero-play-btn">Oynat</button>
      <button class="btn btn-info">Detaylar</button>
    </div>
  </div>
</div>

<div class="content-section" id="diziler">
  <div class="section-title">En Çok İzlenen Orijinaller</div>
  <div class="cards-row" id="series-row"></div>
</div>

<div class="content-section" id="filmler" style="margin-top: 20px;">
  <div class="section-title">Popüler Filmler</div>
  <div class="cards-row" id="movies-row"></div>
</div>

<div id="series-modal">
  <div class="close-btn" onclick="closeSeriesModal()" style="position:fixed;">✕</div>
  <div class="series-modal-content">
    <div class="series-header">
      <img id="sm-poster" class="series-poster" src="" alt="Poster">
      <div class="series-info">
        <h2 id="sm-title"></h2>
        <p id="sm-desc"></p>
      </div>
    </div>
    <div class="episodes-list" id="sm-episodes"></div>
  </div>
</div>

<div id="player-modal">
  <div class="close-btn" onclick="closePlayer()">✕</div>
  <div class="player-container" id="player-container">
    <video id="video-player" playsinline webkit-playsinline></video>
    <iframe id="yt-player" allow="autoplay; fullscreen" allowfullscreen="true" webkitallowfullscreen="true" mozallowfullscreen="true" style="display:none;"></iframe>
    
    <div class="custom-controls" id="custom-controls" style="display:none;">
      <div class="progress-container" id="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="controls-main">
        <button class="ctrl-btn" id="play-pause-btn">
          <svg id="icon-play" viewBox="0 0 24 24" fill="white" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" viewBox="0 0 24 24" fill="white" width="28" height="28" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="time-display" id="time-display">00:00 / 00:00</div>
        <div class="spacer" style="flex:1;"></div>
        <button class="ctrl-btn" id="fullscreen-btn">
          <svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- iOS STYLE BOTTOM TAB BAR (Sadece mobilde görünür) -->
<div class="ios-tab-bar" id="ios-tab-bar">
  <div class="tab-item active">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Ana Sayfa</span>
  </div>
  <div class="tab-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <span>Ara</span>
  </div>
  <div class="tab-item">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg>
    <span>Arşiv</span>
  </div>
</div>

<footer><p>SiomJourney </p></footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
